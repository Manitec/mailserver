<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>Manitec Mail</title>
    <link rel="manifest" href="/static/manifest.json">
    <meta name="theme-color" content="#0d1117">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="Manitec Mail">
    <meta name="mobile-web-app-capable" content="yes">
    <link rel="apple-touch-icon" sizes="180x180" href="/static/icons/icon-192x192.png">
    <link rel="icon" type="image/png" sizes="192x192" href="/static/icons/icon-192x192.png">
    <link rel="icon" type="image/png" sizes="512x512" href="/static/icons/icon-512x512.png">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
    <style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}

:root {
    --blue:        #3b82f6;
    --blue-dim:    #2563eb;
    --blue-glow:   rgba(59,130,246,0.12);
    --green:       #10b981;
    --red:         #ef4444;
    --red-dim:     #dc2626;

    --bg:          #0d1117;
    --surface-1:   #161b22;
    --surface-2:   #1c2333;
    --surface-3:   #21262d;
    --surface-hover:#2d333b;
    --border:      rgba(255,255,255,0.07);
    --border-focus:rgba(59,130,246,0.55);

    --text-1:      #e6edf3;
    --text-2:      #8b949e;
    --text-3:      #484f58;

    --radius-sm:   6px;
    --radius-md:   10px;
    --radius-lg:   14px;

    --ease:        cubic-bezier(0.16,1,0.3,1);
    --t-fast:      120ms;
    --t-med:       200ms;

    --sidebar-w:   260px;
    --header-h:    52px;
}

html,body {
    height:100%; height:100dvh;
    font-family:'Inter',system-ui,sans-serif;
    background:var(--bg);
    color:var(--text-1);
    -webkit-text-size-adjust:100%;
    touch-action:manipulation;
    overflow:hidden;
    -webkit-font-smoothing:antialiased;
}

::-webkit-scrollbar{width:4px}
::-webkit-scrollbar-track{background:transparent}
::-webkit-scrollbar-thumb{background:var(--surface-3);border-radius:99px}
::-webkit-scrollbar-thumb:hover{background:var(--text-3)}

.app {
    display:grid;
    grid-template-columns:var(--sidebar-w) 1fr;
    grid-template-rows:var(--header-h) 1fr;
    height:100dvh;
    width:100vw;
}

/* SIDEBAR */
.sidebar {
    grid-row:1/-1;
    background:var(--surface-1);
    border-right:1px solid var(--border);
    display:flex;
    flex-direction:column;
    overflow:hidden;
}
.sidebar-brand {
    height:var(--header-h);
    padding:0 16px;
    display:flex;align-items:center;gap:10px;
    border-bottom:1px solid var(--border);
    flex-shrink:0;
}
.brand-icon{width:26px;height:26px;flex-shrink:0}
.brand-name{font-size:14px;font-weight:600;color:var(--text-1);letter-spacing:-0.01em}
.sidebar-user{padding:12px 16px;border-bottom:1px solid var(--border);flex-shrink:0}
.user-email{font-size:12px;color:var(--text-2);white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.sidebar-nav{flex:1;padding:8px;overflow-y:auto;display:flex;flex-direction:column;gap:2px}
.nav-btn{
    width:100%;padding:9px 12px;background:none;border:none;border-radius:var(--radius-sm);
    color:var(--text-2);font-size:13px;font-weight:500;font-family:inherit;cursor:pointer;
    display:flex;align-items:center;gap:10px;text-align:left;
    transition:background var(--t-fast) var(--ease),color var(--t-fast) var(--ease);
    -webkit-tap-highlight-color:transparent;
}
.nav-btn:hover,.nav-btn:focus-visible{background:var(--surface-hover);color:var(--text-1)}
.nav-btn:focus-visible{outline:2px solid var(--border-focus);outline-offset:-2px}
.nav-btn:active{transform:scale(0.98)}
.nav-btn.active{background:var(--blue-glow);color:var(--blue)}
.nav-btn svg{flex-shrink:0;opacity:.7}
.nav-btn.active svg,.nav-btn:hover svg{opacity:1}
.sidebar-compose{padding:12px;border-top:1px solid var(--border);flex-shrink:0}
.compose-btn{
    width:100%;padding:10px 16px;background:var(--blue);color:#fff;
    border:none;border-radius:var(--radius-md);
    font-size:13px;font-weight:600;font-family:inherit;cursor:pointer;
    display:flex;align-items:center;justify-content:center;gap:8px;
    transition:background var(--t-fast) var(--ease),transform var(--t-fast) var(--ease);
    -webkit-tap-highlight-color:transparent;
}
.compose-btn:hover{background:var(--blue-dim)}
.compose-btn:active{transform:scale(0.98)}
.compose-btn:focus-visible{outline:2px solid rgba(255,255,255,0.5);outline-offset:2px}

/* TOPBAR */
.topbar {
    grid-column:2;background:var(--surface-1);border-bottom:1px solid var(--border);
    padding:0 20px;display:flex;align-items:center;justify-content:space-between;
    gap:12px;height:var(--header-h);
}
.topbar-title{font-size:14px;font-weight:600;color:var(--text-1)}
.topbar-actions{display:flex;align-items:center;gap:6px}

/* BUTTONS */
.icon-btn{
    width:32px;height:32px;background:none;border:none;border-radius:var(--radius-sm);
    color:var(--text-2);cursor:pointer;display:flex;align-items:center;justify-content:center;
    transition:background var(--t-fast) var(--ease),color var(--t-fast) var(--ease);
    -webkit-tap-highlight-color:transparent;flex-shrink:0;
}
.icon-btn:hover{background:var(--surface-hover);color:var(--text-1)}
.icon-btn:focus-visible{outline:2px solid var(--border-focus);outline-offset:-2px;border-radius:var(--radius-sm)}
.icon-btn:active{transform:scale(0.9)}
.text-btn{
    padding:6px 12px;background:var(--surface-3);border:1px solid var(--border);
    border-radius:var(--radius-sm);color:var(--text-1);font-size:13px;font-weight:500;
    font-family:inherit;cursor:pointer;white-space:nowrap;
    transition:background var(--t-fast) var(--ease);
    -webkit-tap-highlight-color:transparent;
}
.text-btn:hover{background:var(--surface-hover)}
.text-btn:focus-visible{outline:2px solid var(--border-focus);outline-offset:1px}
.text-btn:active{transform:scale(0.97)}
.text-btn.primary{background:var(--blue);border-color:transparent;color:#fff}
.text-btn.primary:hover{background:var(--blue-dim)}
.text-btn.danger{background:rgba(239,68,68,0.1);border-color:rgba(239,68,68,0.3);color:var(--red)}
.text-btn.danger:hover{background:rgba(239,68,68,0.18)}

/* MAIN */
.main{grid-column:2;display:flex;flex-direction:column;min-height:0;overflow:hidden}
.view{display:none;flex-direction:column;flex:1;min-height:0;overflow:hidden}
.view.active{display:flex}

/* EMAIL LIST */
.email-list{flex:1;overflow-y:auto;padding:8px}
.email-item{
    padding:12px 14px;border-radius:var(--radius-md);cursor:pointer;
    transition:background var(--t-fast) var(--ease);
    display:grid;grid-template-columns:1fr auto;grid-template-rows:auto auto;
    gap:2px 12px;-webkit-tap-highlight-color:transparent;
    border:1px solid transparent;
}
.email-item:hover{background:var(--surface-2);border-color:var(--border)}
.email-item:active{background:var(--surface-3)}
.email-item+.email-item{margin-top:2px}
.email-from{font-size:13px;font-weight:600;color:var(--text-1);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;grid-column:1}
.email-date{font-size:11px;color:var(--text-3);white-space:nowrap;grid-column:2;grid-row:1;align-self:center}
.email-subject{font-size:13px;color:var(--text-2);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;grid-column:1/-1}

/* STATE EMPTY */
.state-empty{
    flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;
    gap:10px;padding:40px;color:var(--text-3);text-align:center;
}
.state-empty svg{opacity:.3}
.state-empty p{font-size:13px;max-width:24ch}

/* DETAIL */
.detail-header{padding:20px;border-bottom:1px solid var(--border);background:var(--surface-1);flex-shrink:0}
.detail-subject{font-size:17px;font-weight:600;line-height:1.35;word-break:break-word;margin-bottom:12px}
.detail-meta{display:flex;flex-direction:column;gap:4px;font-size:12px;color:var(--text-2)}
.detail-meta span{color:var(--text-1)}
.detail-actions{
    padding:8px 16px;border-bottom:1px solid var(--border);
    display:flex;gap:6px;background:var(--surface-1);flex-shrink:0;
}
.detail-body{
    flex:1;overflow-y:auto;padding:20px;font-size:14px;line-height:1.75;
    word-wrap:break-word;color:var(--text-1);
}
.detail-body img{max-width:100%;height:auto;border-radius:var(--radius-sm)}

/* COMPOSE */
.compose-body{flex:1;overflow-y:auto;padding:16px;display:flex;flex-direction:column;gap:0}
.field{display:flex;align-items:baseline;border-bottom:1px solid var(--border);padding:0}
.field:last-of-type{border-bottom:none}
.field-label{
    font-size:12px;font-weight:600;color:var(--text-3);padding:13px 14px 13px 0;
    width:56px;flex-shrink:0;text-transform:uppercase;letter-spacing:0.04em;
}
.field-input{
    flex:1;padding:13px 0;background:none;border:none;color:var(--text-1);
    font-size:14px;font-family:inherit;outline:none;min-width:0;
}
.field-input::placeholder{color:var(--text-3)}
.compose-area{
    flex:1;margin-top:12px;padding:0;background:none;border:none;color:var(--text-1);
    font-size:14px;font-family:inherit;line-height:1.7;outline:none;resize:none;min-height:200px;
}
.compose-area::placeholder{color:var(--text-3)}
.compose-footer{
    padding:12px 16px;border-top:1px solid var(--border);
    display:flex;align-items:center;justify-content:space-between;gap:12px;flex-shrink:0;
}
.send-status{font-size:13px}
.send-status.ok{color:var(--green)}
.send-status.err{color:var(--red)}

/* INSTALL */
.install-cta{
    position:fixed;right:16px;bottom:16px;z-index:999;
    display:none;align-items:center;gap:9px;padding:11px 18px;
    background:var(--surface-2);border:1px solid var(--border);border-radius:999px;
    box-shadow:0 8px 24px rgba(0,0,0,.5);color:var(--text-1);
    font-size:13px;font-weight:600;font-family:inherit;cursor:pointer;white-space:nowrap;
    transition:transform var(--t-fast) var(--ease),box-shadow var(--t-fast) var(--ease);
}
.install-cta:hover{transform:translateY(-2px);box-shadow:0 12px 32px rgba(0,0,0,.6)}
.install-cta:active{transform:scale(0.97)}
.install-cta:focus-visible{outline:2px solid var(--border-focus);outline-offset:2px}
.install-dot{width:8px;height:8px;border-radius:50%;background:var(--green);flex-shrink:0}

.hidden{display:none!important}

/* MOBILE */
@media(max-width:768px){
    .app{grid-template-columns:1fr;grid-template-rows:var(--header-h) 1fr}
    .sidebar{
        grid-row:unset;position:fixed;inset:0;z-index:100;
        transform:translateX(-100%);transition:transform var(--t-med) var(--ease);
        width:min(280px,85vw);
    }
    .sidebar.open{transform:translateX(0)}
    .sidebar-overlay{
        display:none;position:fixed;inset:0;z-index:99;
        background:rgba(0,0,0,.6);backdrop-filter:blur(2px);
    }
    .sidebar-overlay.open{display:block}
    .topbar{grid-column:1}
    .main{grid-column:1}
    .detail-header{padding:14px 16px}
    .detail-subject{font-size:15px}
    .detail-body{padding:16px}
    .compose-body{padding:12px}
    .install-cta{
        right:12px;left:12px;bottom:env(safe-area-inset-bottom,12px);
        justify-content:center;max-width:none;
    }
}
    </style>
</head>
<body>

<div class="sidebar-overlay" id="sidebar-overlay" onclick="closeSidebar()"></div>

<div class="app">

  <aside class="sidebar" id="sidebar" aria-label="Navigation">
    <div class="sidebar-brand">
      <svg class="brand-icon" viewBox="0 0 26 26" fill="none" aria-hidden="true">
        <rect width="26" height="26" rx="7" fill="#3b82f6"/>
        <path d="M6 9 L13 15 L20 9" stroke="white" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"/>
        <path d="M6 9 L6 18.5Q6 19.5 7 19.5L19 19.5Q20 19.5 20 18.5L20 9" stroke="white" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"/>
      </svg>
      <span class="brand-name">Manitec Mail</span>
    </div>
    <div class="sidebar-user">
      <div class="user-email" id="user-email">Loading…</div>
    </div>
    <nav class="sidebar-nav" aria-label="Folders">
      <button class="nav-btn active" id="nav-inbox" onclick="goInbox()" aria-current="page">
        <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><polyline points="22 12 16 12 14 15 10 15 8 12 2 12"/><path d="M5.45 5.11L2 12v6a2 2 0 0 0 2 2h16a2 2 0 0 0 2-2v-6l-3.45-6.89A2 2 0 0 0 16.76 4H7.24a2 2 0 0 0-1.79 1.11z"/></svg>
        Inbox
      </button>
      <button class="nav-btn" onclick="window.location.href='/settings'">
        <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><circle cx="12" cy="12" r="3"/><path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 0 1-2.83 2.83l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-4 0v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 0 1-2.83-2.83l.06-.06A1.65 1.65 0 0 0 4.68 15a1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1 0-4h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 0 1 2.83-2.83l.06.06A1.65 1.65 0 0 0 9 4.68a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 4 0v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 0 1 2.83 2.83l-.06.06A1.65 1.65 0 0 0 19.4 9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 0 4h-.09a1.65 1.65 0 0 0-1.51 1z"/></svg>
        Settings
      </button>
      <button class="nav-btn" onclick="window.location.href='/logout'">
        <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"/><polyline points="16 17 21 12 16 7"/><line x1="21" y1="12" x2="9" y2="12"/></svg>
        Sign out
      </button>
    </nav>
    <div class="sidebar-compose">
      <button class="compose-btn" onclick="showCompose()" id="sidebar-compose-btn">
        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>
        Compose
      </button>
    </div>
  </aside>

  <header class="topbar" role="banner">
    <div style="display:flex;align-items:center;gap:10px">
      <button class="icon-btn" id="menu-btn" onclick="toggleSidebar()" aria-label="Menu" style="display:none">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" aria-hidden="true"><line x1="3" y1="6" x2="21" y2="6"/><line x1="3" y1="12" x2="21" y2="12"/><line x1="3" y1="18" x2="21" y2="18"/></svg>
      </button>
      <h1 class="topbar-title" id="topbar-title">Inbox</h1>
    </div>
    <div class="topbar-actions" id="topbar-actions">
      <button class="icon-btn" onclick="loadInbox()" aria-label="Refresh inbox" id="refresh-btn">
        <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><polyline points="23 4 23 10 17 10"/><path d="M20.49 15a9 9 0 1 1-2.12-9.36L23 10"/></svg>
      </button>
    </div>
  </header>

  <main class="main" id="main">

    <div class="view active" id="inbox-view" role="region" aria-label="Inbox">
      <div class="email-list" id="email-list" role="list"></div>
    </div>

    <div class="view" id="detail-view" role="region" aria-label="Email detail">
      <div class="detail-header">
        <div class="detail-subject" id="detail-subject"></div>
        <div class="detail-meta">
          <div>From&nbsp; <span id="detail-from"></span></div>
          <div>To&nbsp;&nbsp;&nbsp; <span id="detail-to"></span></div>
          <div>Date&nbsp; <span id="detail-date"></span></div>
        </div>
      </div>
      <div class="detail-actions">
        <button class="text-btn primary" onclick="showReply()">
          <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round" style="display:inline;vertical-align:-1px" aria-hidden="true"><polyline points="9 17 4 12 9 7"/><path d="M20 18v-2a4 4 0 0 0-4-4H4"/></svg>
          Reply
        </button>
        <button class="text-btn" onclick="showForward()">
          <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round" style="display:inline;vertical-align:-1px" aria-hidden="true"><polyline points="15 17 20 12 15 7"/><path d="M4 18v-2a4 4 0 0 1 4-4h12"/></svg>
          Forward
        </button>
        <button class="text-btn danger" onclick="deleteEmail()">
          <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round" style="display:inline;vertical-align:-1px" aria-hidden="true"><polyline points="3 6 5 6 21 6"/><path d="M19 6v14a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2V6m3 0V4a1 1 0 0 1 1-1h4a1 1 0 0 1 1 1v2"/></svg>
          Delete
        </button>
      </div>
      <div id="detail-body" class="detail-body"></div>
    </div>

    <div class="view" id="compose-view" role="region" aria-label="Compose email">
      <div class="compose-body">
        <div class="field">
          <label class="field-label" for="compose-to">To</label>
          <input class="field-input" type="email" id="compose-to" placeholder="recipient@example.com" autocomplete="email" autocapitalize="none">
        </div>
        <div class="field">
          <label class="field-label" for="compose-subject">Subject</label>
          <input class="field-input" type="text" id="compose-subject" placeholder="Subject">
        </div>
        <textarea class="compose-area" id="compose-content" placeholder="Write your message…" aria-label="Message body"></textarea>
      </div>
      <div class="compose-footer">
        <button class="text-btn" onclick="backToInbox()">Discard</button>
        <div style="display:flex;align-items:center;gap:10px">
          <span class="send-status" id="compose-status" aria-live="polite"></span>
          <button class="text-btn primary" onclick="sendEmail()" id="send-btn">
            Send
            <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round" style="display:inline;vertical-align:-1px;margin-left:4px" aria-hidden="true"><line x1="22" y1="2" x2="11" y2="13"/><polygon points="22 2 15 22 11 13 2 9 22 2"/></svg>
          </button>
        </div>
      </div>
    </div>

  </main>
</div>

<button class="install-cta" id="install-cta" type="button" aria-label="Install Manitec Mail as an app" hidden>
  <span class="install-dot" aria-hidden="true"></span>
  Install app
</button>

<script>
const API = '';
let currentMsg = null;
let currentMsgId = null;
let composeMode = 'new';
let inboxCache = [];

function setView(id, title) {
    document.querySelectorAll('.view').forEach(v => v.classList.remove('active'));
    document.getElementById(id).classList.add('active');
    document.getElementById('topbar-title').textContent = title;
    document.getElementById('refresh-btn').style.display = id === 'inbox-view' ? '' : 'none';
    const backBtn = document.getElementById('topbar-back');
    if (backBtn) backBtn.style.display = id !== 'inbox-view' ? '' : 'none';
}

function toggleSidebar() {
    document.getElementById('sidebar').classList.toggle('open');
    document.getElementById('sidebar-overlay').classList.toggle('open');
}
function closeSidebar() {
    document.getElementById('sidebar').classList.remove('open');
    document.getElementById('sidebar-overlay').classList.remove('open');
}

function setupResponsive() {
    const isMobile = window.matchMedia('(max-width: 768px)').matches;
    document.getElementById('menu-btn').style.display = isMobile ? '' : 'none';
    if (!document.getElementById('topbar-back')) {
        const btn = document.createElement('button');
        btn.id = 'topbar-back';
        btn.className = 'text-btn';
        btn.style.display = 'none';
        btn.textContent = '← Back';
        btn.onclick = () => { backToInbox(); closeSidebar(); };
        document.getElementById('topbar-actions').prepend(btn);
    }
}
window.addEventListener('resize', setupResponsive);

async function loadUserInfo() {
    try {
        const r = await fetch(`${API}/me`);
        if (r.ok) {
            const u = await r.json();
            document.getElementById('user-email').textContent = u.email || 'Unknown';
        } else {
            document.getElementById('user-email').textContent = 'Not signed in';
        }
    } catch { document.getElementById('user-email').textContent = 'Offline'; }
}

async function loadInbox() {
    closeSidebar();
    setView('inbox-view', 'Inbox');
    document.querySelectorAll('.nav-btn').forEach(b => b.classList.remove('active'));
    document.getElementById('nav-inbox').classList.add('active');

    const list = document.getElementById('email-list');
    list.innerHTML = '<div class="state-empty"><svg width="28" height="28" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" aria-hidden="true"><line x1="12" y1="2" x2="12" y2="6"/><line x1="12" y1="18" x2="12" y2="22"/><line x1="4.93" y1="4.93" x2="7.76" y2="7.76"/><line x1="16.24" y1="16.24" x2="19.07" y2="19.07"/><line x1="2" y1="12" x2="6" y2="12"/><line x1="18" y1="12" x2="22" y2="12"/><line x1="4.93" y1="19.07" x2="7.76" y2="16.24"/><line x1="16.24" y1="7.76" x2="19.07" y2="4.93"/></svg><p>Loading…</p></div>';

    try {
        const r = await fetch(`${API}/inbox?limit=50`);
        if (!r.ok) throw new Error(await r.text());
        const data = await r.json();
        inboxCache = data || [];

        if (!inboxCache.length) {
            list.innerHTML = '<div class="state-empty"><svg width="36" height="36" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" aria-hidden="true"><polyline points="22 12 16 12 14 15 10 15 8 12 2 12"/><path d="M5.45 5.11L2 12v6a2 2 0 0 0 2 2h16a2 2 0 0 0 2-2v-6l-3.45-6.89A2 2 0 0 0 16.76 4H7.24a2 2 0 0 0-1.79 1.11z"/></svg><p>Your inbox is empty</p></div>';
            return;
        }

        list.innerHTML = inboxCache.map(msg => {
            const date = msg.receivedTime ? fmtDate(parseInt(msg.receivedTime)) : '';
            const from = esc(msg.fromAddress || msg.sender || 'Unknown');
            const subj = esc(msg.subject || msg.summary || '(No subject)');
            return `<div class="email-item" role="listitem" tabindex="0"
                onclick="loadMessage('${msg.messageId}')"
                onkeydown="if(event.key==='Enter'||event.key===' ')loadMessage('${msg.messageId}')">
                <div class="email-from">${from}</div>
                <div class="email-date">${date}</div>
                <div class="email-subject">${subj}</div>
            </div>`;
        }).join('');

    } catch(e) {
        list.innerHTML = `<div class="state-empty" style="color:var(--red)"><svg width="28" height="28" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" aria-hidden="true"><circle cx="12" cy="12" r="10"/><line x1="12" y1="8" x2="12" y2="12"/><line x1="12" y1="16" x2="12.01" y2="16"/></svg><p>${esc(e.message)}</p></div>`;
    }
}

function goInbox() { loadInbox(); }

async function loadMessage(msgId) {
    setView('detail-view', 'Email');
    document.getElementById('detail-body').textContent = 'Loading…';
    document.getElementById('detail-subject').textContent = '';

    try {
        const r = await fetch(`${API}/message/${msgId}`);
        if (!r.ok) throw new Error(await r.text());
        const data = await r.json();
        const meta = inboxCache.find(m => m.messageId === msgId);
        if (!meta) throw new Error('Message not found — try refreshing.');

        currentMsg = { ...meta, content: data.content };
        currentMsgId = msgId;

        document.getElementById('detail-subject').textContent = meta.subject || meta.summary || '(No subject)';
        document.getElementById('detail-from').textContent = meta.fromAddress || meta.sender || 'Unknown';
        document.getElementById('detail-to').textContent = (meta.toAddress || '').replace(/[<>]/g,'') || '—';
        document.getElementById('detail-date').textContent = meta.receivedTime ? new Date(parseInt(meta.receivedTime)).toLocaleString() : '—';
        document.getElementById('detail-body').innerHTML = sanitize(data.content || '(No content)');
    } catch(e) {
        document.getElementById('detail-body').innerHTML = `<span style="color:var(--red)">${esc(e.message)}</span>`;
    }
}

function backToInbox() { loadInbox(); }

function prepareCompose(mode, to='', subject='', body='') {
    composeMode = mode;
    document.getElementById('compose-to').value = to;
    document.getElementById('compose-subject').value = subject;
    document.getElementById('compose-content').value = body;
    document.getElementById('compose-status').textContent = '';
    document.getElementById('send-btn').disabled = false;
    const titles = {new:'New Message', reply:'Reply', forward:'Forward'};
    setView('compose-view', titles[mode] || 'Compose');
    if(location.hash !== '#compose') history.replaceState(null,'','#compose');
    setTimeout(() => {
        const f = document.getElementById(to ? 'compose-subject' : 'compose-to');
        f && f.focus();
    }, 100);
}

function showCompose() { prepareCompose('new'); closeSidebar(); }

function showReply() {
    if (!currentMsg) return;
    prepareCompose('reply',
        currentMsg.fromAddress || '',
        'Re: ' + (currentMsg.subject || ''),
        '\n\n— Original —\n' + (currentMsg.content||'').replace(/<[^>]+>/g,' ').trim().substring(0,400)
    );
}

function showForward() {
    if (!currentMsg) return;
    prepareCompose('forward',
        '',
        'Fwd: ' + (currentMsg.subject || ''),
        '\n\n— Forwarded from ' + (currentMsg.fromAddress||'') + ' —\n' + (currentMsg.content||'').replace(/<[^>]+>/g,' ').trim().substring(0,400)
    );
}

async function sendEmail() {
    const to      = document.getElementById('compose-to').value.trim();
    const subject = document.getElementById('compose-subject').value.trim();
    const content = document.getElementById('compose-content').value;
    const status  = document.getElementById('compose-status');
    const sendBtn = document.getElementById('send-btn');

    if (!to || !subject) {
        status.className = 'send-status err';
        status.textContent = 'To and Subject required';
        return;
    }

    sendBtn.disabled = true;
    status.className = 'send-status';
    status.textContent = 'Sending…';

    try {
        let url, payload = { to, subject, content };

        if (composeMode === 'reply' && currentMsgId) {
            url = `${API}/reply/${currentMsgId}`;
        } else if (composeMode === 'forward' && currentMsg) {
            url = `${API}/forward`;
            payload.original_content = currentMsg.content || '';
        } else {
            url = `${API}/send`;
        }

        const r = await fetch(url, {
            method:'POST',
            headers:{'Content-Type':'application/json'},
            body:JSON.stringify(payload)
        });

        if (r.ok) {
            status.className = 'send-status ok';
            status.textContent = 'Sent';
            setTimeout(() => { history.replaceState(null,'','/'); backToInbox(); }, 1200);
        } else {
            throw new Error(await r.text());
        }
    } catch(e) {
        status.className = 'send-status err';
        status.textContent = e.message || 'Send failed';
        sendBtn.disabled = false;
    }
}

async function deleteEmail() {
    if (!currentMsgId || !confirm('Move to trash?')) return;
    try {
        const r = await fetch(`${API}/message/${currentMsgId}`, {method:'DELETE'});
        if (r.ok) { backToInbox(); }
        else alert('Delete failed: ' + await r.text());
    } catch(e) { alert(e.message); }
}

function esc(t) {
    const d = document.createElement('div');
    d.textContent = t;
    return d.innerHTML;
}

function fmtDate(ms) {
    const d = new Date(ms), now = new Date();
    if (d.toDateString() === now.toDateString()) return d.toLocaleTimeString([], {hour:'2-digit',minute:'2-digit'});
    if (now - d < 6.048e8) return d.toLocaleDateString([], {weekday:'short'});
    return d.toLocaleDateString([], {month:'short',day:'numeric'});
}

function sanitize(html) {
    if (!html) return '(No content)';
    const wrap = document.createElement('div');
    wrap.innerHTML = html;
    const ok = new Set(['div','span','p','br','b','i','u','strong','em','a','img','table','tr','td','th','tbody','thead','tfoot','ul','ol','li','h1','h2','h3','h4','h5','h6','blockquote','pre','code','hr','figure','figcaption']);
    const okAttr = new Set(['href','src','alt','title','width','height','border','cellpadding','cellspacing','style']);
    (function walk(n) {
        for (let i = n.children.length - 1; i >= 0; i--) {
            const c = n.children[i];
            if (c.tagName === 'SCRIPT' || c.tagName === 'STYLE') { c.remove(); continue; }
            if (!ok.has(c.tagName.toLowerCase())) { c.replaceWith(document.createTextNode(c.textContent + ' ')); continue; }
            for (let j = c.attributes.length - 1; j >= 0; j--) {
                if (!okAttr.has(c.attributes[j].name.toLowerCase())) c.removeAttribute(c.attributes[j].name);
            }
            if (c.tagName === 'A') { c.setAttribute('target','_blank'); c.setAttribute('rel','noopener noreferrer'); }
            walk(c);
        }
    })(wrap);
    return wrap.innerHTML;
}

if ('serviceWorker' in navigator) {
    window.addEventListener('load', async () => {
        try {
            const reg = await navigator.serviceWorker.register('/static/sw.js');
            console.log('[SW] registered:', reg.scope);
        } catch(e) {
            console.error('[SW] registration failed:', e);
        }
    });
}

let _prompt;
const installBtn = document.getElementById('install-cta');
const standalone = window.matchMedia('(display-mode: standalone)').matches || navigator.standalone;

if (!standalone) {
    window.addEventListener('beforeinstallprompt', e => {
        e.preventDefault();
        _prompt = e;
        installBtn.hidden = false;
        installBtn.style.display = 'inline-flex';
    });
    installBtn.addEventListener('click', async () => {
        if (!_prompt) return;
        _prompt.prompt();
        const { outcome } = await _prompt.userChoice;
        if (outcome === 'accepted') { installBtn.hidden = true; installBtn.style.display = 'none'; }
        _prompt = null;
    });
    window.addEventListener('appinstalled', () => {
        installBtn.hidden = true;
        installBtn.style.display = 'none';
        _prompt = null;
    });
}

setupResponsive();
loadUserInfo();
if (location.hash === '#compose') showCompose();
else loadInbox();
</script>
