<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Manitec Mail</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }

        :root {
            --primary: #3b82f6;
            --primary-dark: #2563eb;
            --danger: #ef4444;
            --danger-dark: #dc2626;
            --success: #10b981;
            --bg-main: #0f172a;
            --bg-secondary: #1e293b;
            --bg-card: #334155;
            --text-primary: #f1f5f9;
            --text-secondary: #94a3b8;
            --border: #475569;
            --shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.3);
        }

        html, body {
            height: 100%;
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: var(--bg-main);
            color: var(--text-primary);
            line-height: 1.6;
            overflow: hidden;
        }

        .app-container {
            display: flex;
            flex-direction: row;
            height: 100vh;
            width: 100vw;
        }

        .sidebar {
            width: 280px;
            min-width: 280px;
            height: 100vh;
            background: var(--bg-secondary);
            border-right: 1px solid var(--border);
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }

        .sidebar-header {
            padding: 24px 20px;
            border-bottom: 1px solid var(--border);
        }

        .sidebar-header h1 {
            font-size: 20px;
            font-weight: 600;
            margin-bottom: 8px;
            color: var(--primary);
        }

        .sidebar-header p {
            font-size: 13px;
            color: var(--text-secondary);
        }

        .sidebar-actions {
            padding: 16px;
        }

        .btn {
            display: block;
            width: 100%;
            padding: 12px 16px;
            border: none;
            border-radius: 8px;
            font-size: 14px;
            font-weight: 500;
            cursor: pointer;
            transition: all 0.2s;
            display: flex;
            align-items: center;
            gap: 8px;
            justify-content: center;
        }

        .btn-primary {
            background: var(--primary);
            color: white;
        }

        .btn-primary:hover {
            background: var(--primary-dark);
            transform: translateY(-1px);
            box-shadow: var(--shadow);
        }

        .btn-secondary {
            background: var(--bg-card);
            color: var(--text-primary);
            margin-top: 8px;
        }

        .btn-secondary:hover {
            background: var(--border);
        }

        .btn-danger {
            background: var(--danger);
            color: white;
        }

        .btn-danger:hover {
            background: var(--danger-dark);
        }

        .btn-sm {
            padding: 8px 14px;
            font-size: 13px;
            width: auto;
            display: inline-flex;
        }

        .main-content {
            flex: 1;
            display: flex;
            flex-direction: column;
            height: 100vh;
            overflow: hidden;
            min-width: 0;
        }

        .topbar {
            background: var(--bg-secondary);
            border-bottom: 1px solid var(--border);
            padding: 16px 24px;
            display: flex;
            align-items: center;
            justify-content: space-between;
        }

        .topbar h2 {
            font-size: 18px;
            font-weight: 600;
        }

        .email-list {
            flex: 1;
            overflow-y: auto;
            padding: 16px 24px;
        }

        .email-item {
            background: var(--bg-card);
            border: 1px solid var(--border);
            border-radius: 10px;
            padding: 16px;
            margin-bottom: 12px;
            cursor: pointer;
            transition: all 0.2s;
        }

        .email-item:hover {
            border-color: var(--primary);
            transform: translateX(4px);
            box-shadow: var(--shadow);
        }

        .email-from {
            font-weight: 600;
            color: var(--text-primary);
            font-size: 14px;
            margin-bottom: 4px;
        }

        .email-subject {
            color: var(--text-secondary);
            font-size: 13px;
            margin-bottom: 6px;
        }

        .email-date {
            color: var(--text-secondary);
            font-size: 12px;
            opacity: 0.7;
        }

        .email-detail {
            display: none;
            flex-direction: column;
            height: 100%;
        }

        .email-detail.active {
            display: flex;
        }

        .detail-header {
            background: var(--bg-secondary);
            padding: 24px;
            border-bottom: 1px solid var(--border);
        }

        .detail-subject {
            font-size: 22px;
            font-weight: 600;
            margin-bottom: 16px;
        }

        .detail-meta {
            display: flex;
            flex-direction: column;
            gap: 8px;
            font-size: 14px;
            color: var(--text-secondary);
        }

        .detail-meta strong {
            color: var(--text-primary);
            font-weight: 500;
        }

        .detail-actions {
            padding: 16px 24px;
            background: var(--bg-secondary);
            border-bottom: 1px solid var(--border);
            display: flex;
            gap: 12px;
        }

        .detail-body {
            flex: 1;
            padding: 24px;
            overflow-y: auto;
            background: var(--bg-main);
            white-space: normal;
            line-height: 1.8;
        }

        .compose-screen {
            display: none;
            flex-direction: column;
            height: 100%;
        }

        .compose-screen.active {
            display: flex;
        }

        .compose-header {
            background: var(--bg-secondary);
            padding: 20px 24px;
            border-bottom: 1px solid var(--border);
            display: flex;
            align-items: center;
            justify-content: space-between;
        }

        .compose-header h2 {
            font-size: 18px;
            font-weight: 600;
        }

        .compose-form {
            flex: 1;
            padding: 24px;
            overflow-y: auto;
        }

        .form-group {
            margin-bottom: 20px;
        }

        .form-label {
            display: block;
            font-size: 13px;
            font-weight: 500;
            color: var(--text-secondary);
            margin-bottom: 8px;
        }

        .form-input {
            width: 100%;
            padding: 12px 16px;
            background: var(--bg-card);
            border: 1px solid var(--border);
            border-radius: 8px;
            color: var(--text-primary);
            font-size: 14px;
            transition: all 0.2s;
        }

        .form-input:focus {
            outline: none;
            border-color: var(--primary);
            box-shadow: 0 0 0 3px rgba(59, 130, 246, 0.1);
        }

        textarea.form-input {
            min-height: 200px;
            resize: vertical;
            font-family: inherit;
        }

        .status-message {
            padding: 12px 16px;
            border-radius: 8px;
            margin-top: 16px;
            font-size: 14px;
            font-weight: 500;
        }

        .status-success {
            background: rgba(16, 185, 129, 0.1);
            border: 1px solid var(--success);
            color: var(--success);
        }

        .status-error {
            background: rgba(239, 68, 68, 0.1);
            border: 1px solid var(--danger);
            color: var(--danger);
        }

        ::-webkit-scrollbar { width: 8px; }
        ::-webkit-scrollbar-track { background: var(--bg-secondary); }
        ::-webkit-scrollbar-thumb {
            background: var(--border);
            border-radius: 4px;
        }
        ::-webkit-scrollbar-thumb:hover { background: var(--text-secondary); }

        .loading {
            text-align: center;
            padding: 40px;
            color: var(--text-secondary);
        }

        .hidden { display: none !important; }
    </style>
</head>
<body>
    <div class="app-container">
        <div class="sidebar">
            <div class="sidebar-header">
    <h1>📧 Manitec Mail</h1>
    <p id="user-info">Loading...</p>
</div>

            <div class="sidebar-actions">
                <button class="btn btn-primary" onclick="showCompose()">✉️ Compose New</button>
                <button class="btn btn-secondary" onclick="loadInbox()">🔄 Refresh Inbox</button>
                <button class="btn btn-secondary" onclick="window.location.href='/logout'" style="margin-top: 16px;">🚪 Logout</button>
            </div>
        </div>

        <div class="main-content">
            <!-- Inbox View -->
            <div id="inbox-view">
                <div class="topbar">
                    <h2>Inbox</h2>
                </div>
                <div class="email-list" id="email-list">
                    <div class="loading">Loading emails...</div>
                </div>
            </div>

            <!-- Email Detail View -->
            <div id="detail-view" class="email-detail">
                <div class="topbar">
                    <h2>Email</h2>
                    <button class="btn btn-secondary btn-sm" onclick="backToInbox()">← Back</button>
                </div>
                <div class="detail-header">
                    <div class="detail-subject" id="detail-subject"></div>
                    <div class="detail-meta">
                        <div><strong>From:</strong> <span id="detail-from"></span></div>
                        <div><strong>To:</strong> <span id="detail-to"></span></div>
                        <div><strong>Date:</strong> <span id="detail-date"></span></div>
                    </div>
                </div>
                <div class="detail-actions">
                    <button class="btn btn-primary btn-sm" onclick="showReply()">↩️ Reply</button>
                    <button class="btn btn-primary btn-sm" onclick="showForward()">↪️ Forward</button>
                    <button class="btn btn-danger btn-sm" onclick="deleteEmail()">🗑️ Delete</button>
                </div>
                <div class="detail-body" id="detail-body"></div>
            </div>

            <!-- Compose View -->
            <div id="compose-view" class="compose-screen">
                <div class="compose-header">
                    <h2 id="compose-title">Compose Email</h2>
                    <button class="btn btn-secondary btn-sm" onclick="backToInbox()">Cancel</button>
                </div>
                <div class="compose-form">
                    <div class="form-group">
                        <label class="form-label">To</label>
                        <input type="email" class="form-input" id="compose-to" placeholder="recipient@example.com">
                    </div>
                    <div class="form-group">
                        <label class="form-label">Subject</label>
                        <input type="text" class="form-input" id="compose-subject" placeholder="Email subject">
                    </div>
                    <div class="form-group">
                        <label class="form-label">Message</label>
                        <textarea class="form-input" id="compose-content" placeholder="Type your message here..."></textarea>
                    </div>
                    <button class="btn btn-primary" onclick="sendEmail()" style="width:auto;display:inline-flex;">📤 Send Email</button>
                    <div id="compose-status"></div>
                </div>
            </div>
        </div>
    </div>

    <script>
        const API_BASE = "";  // same origin
        let currentMessage = null;
        let currentMessageId = null;
        let composeMode = "new"; // "new" | "reply" | "forward"

        function showView(viewId) {
            document.getElementById("inbox-view").classList.add("hidden");
            document.getElementById("detail-view").classList.remove("active");
            document.getElementById("compose-view").classList.remove("active");

            if (viewId === "inbox") {
                document.getElementById("inbox-view").classList.remove("hidden");
            } else if (viewId === "detail") {
                document.getElementById("detail-view").classList.add("active");
            } else if (viewId === "compose") {
                document.getElementById("compose-view").classList.add("active");
            }
        }

        function backToInbox() {
            showView("inbox");
            loadInbox();
        }

        function showCompose() {
            composeMode = "new";
            currentMessageId = null;
            document.getElementById("compose-title").textContent = "Compose Email";
            document.getElementById("compose-to").value = "";
            document.getElementById("compose-subject").value = "";
            document.getElementById("compose-content").value = "";
            document.getElementById("compose-status").innerHTML = "";
            showView("compose");
        }

        function showReply() {
            if (!currentMessage) {
                alert("No email selected to reply to.");
                return;
            }
            composeMode = "reply";
            currentMessageId = currentMessage.messageId || currentMessageId;
            document.getElementById("compose-title").textContent = "Reply to Email";
            document.getElementById("compose-to").value = currentMessage.fromAddress || "";
            document.getElementById("compose-subject").value = "Re: " + (currentMessage.subject || "");
            document.getElementById("compose-content").value =
                "\n\n--- Original Message ---\n" + (currentMessage.content ? currentMessage.content.substring(0, 500) : "");
            document.getElementById("compose-status").innerHTML = "";
            showView("compose");
        }

        function showForward() {
            if (!currentMessage) {
                alert("No email selected to forward.");
                return;
            }
            composeMode = "forward";
            currentMessageId = currentMessage.messageId || currentMessageId;
            document.getElementById("compose-title").textContent = "Forward Email";
            document.getElementById("compose-to").value = "";
            document.getElementById("compose-subject").value = "Fwd: " + (currentMessage.subject || "");
            document.getElementById("compose-content").value =
                "\n\n--- Forwarded Message ---\nFrom: " + (currentMessage.fromAddress || "") +
                "\nSubject: " + (currentMessage.subject || "") +
                "\n\n" + (currentMessage.content ? currentMessage.content.substring(0, 500) : "");
            document.getElementById("compose-status").innerHTML = "";
            showView("compose");
        }

        async function loadInbox() {
            const listEl = document.getElementById("email-list");
            listEl.innerHTML = '<div class="loading">Loading emails...</div>';
            try {
                const resp = await fetch(`${API_BASE}/inbox?limit=20`);
                if (!resp.ok) {
                    const errText = await resp.text();
                    listEl.innerHTML = `<div class="loading" style="color: var(--danger);">Error: ${errText}</div>`;
                    return;
                }
                const data = await resp.json();
                if (!data || data.length === 0) {
                    listEl.innerHTML = '<div class="loading">Inbox is empty</div>';
                    return;
                }

                let html = "";
                data.forEach(msg => {
                    const date = msg.receivedTime ? new Date(parseInt(msg.receivedTime)).toLocaleString() : "";
                    html += `
                        <div class="email-item" onclick="loadMessage('${msg.messageId}')">
                            <div class="email-from">${escapeHtml(msg.fromAddress || msg.sender || "Unknown")}</div>
                            <div class="email-subject">${escapeHtml(msg.subject || "(No subject)")}</div>
                            <div class="email-date">${date}</div>
                        </div>
                    `;
                });
                listEl.innerHTML = html;
            } catch (err) {
                listEl.innerHTML = `<div class="loading" style="color: var(--danger);">Error: ${err.message}</div>`;
            }
        }

        async function loadMessage(messageId) {
            showView("detail");
            document.getElementById("detail-body").textContent = "Loading...";
            try {
                const resp = await fetch(`${API_BASE}/message/${messageId}`);
                if (!resp.ok) {
                    const errText = await resp.text();
                    document.getElementById("detail-body").textContent = `Error: ${errText}`;
                    return;
                }
                const data = await resp.json();

                currentMessage = data;
                currentMessage.messageId = messageId;
                currentMessageId = messageId;

                document.getElementById("detail-subject").textContent = data.subject || "(No subject)";
                document.getElementById("detail-from").textContent = data.fromAddress || "Unknown";
                document.getElementById("detail-to").textContent = data.toAddress || "";
                document.getElementById("detail-date").textContent =
                    data.receivedTime ? new Date(parseInt(data.receivedTime)).toLocaleString() : "";

                const content = data.content || "(No content)";
                document.getElementById("detail-body").innerHTML = sanitizeHtml(content);
            } catch (err) {
                document.getElementById("detail-body").textContent = `Error: ${err.message}`;
            }
        }

        async function deleteEmail() {
            if (!currentMessageId) {
                alert("No email selected to delete.");
                return;
            }
            if (!confirm("Move this email to trash?")) return;
            try {
                const resp = await fetch(`${API_BASE}/message/${currentMessageId}`, { method: "DELETE" });
                if (resp.ok) {
                    backToInbox();
                } else {
                    const errText = await resp.text();
                    alert("Error deleting email: " + errText);
                }
            } catch (err) {
                alert("Error: " + err.message);
            }
        }

        async function sendEmail() {
            const to = document.getElementById("compose-to").value.trim();
            const subject = document.getElementById("compose-subject").value.trim();
            const content = document.getElementById("compose-content").value;
            const statusEl = document.getElementById("compose-status");

            if (!to || !subject) {
                statusEl.innerHTML = '<div class="status-message status-error">To and Subject are required</div>';
                return;
            }

            statusEl.innerHTML = '<div class="status-message">Sending...</div>';

            try {
                let url;
                let payload = { to, subject, content };

                if (composeMode === "reply" && currentMessageId) {
                    url = `${API_BASE}/reply/${currentMessageId}`;
                } else if (composeMode === "forward" && currentMessage) {
                    url = `${API_BASE}/forward`;
                    payload = {
                        to,
                        subject,
                        content,
                        original_content: currentMessage.content || ""
                    };
                } else {
                    url = `${API_BASE}/send`;
                }

                const resp = await fetch(url, {
                    method: "POST",
                    headers: { "Content-Type": "application/json" },
                    body: JSON.stringify(payload)
                });

                if (resp.ok) {
                    statusEl.innerHTML = '<div class="status-message status-success">✅ Email sent successfully!</div>';
                    setTimeout(() => backToInbox(), 1500);
                } else {
                    const err = await resp.text();
                    statusEl.innerHTML = `<div class="status-message status-error">Error: ${err}</div>`;
                }
            } catch (err) {
                statusEl.innerHTML = `<div class="status-message status-error">Error: ${err.message}</div>`;
            }
        }

        function escapeHtml(text) {
            const div = document.createElement("div");
            div.textContent = text;
            return div.innerHTML;
        }

        async function loadUserInfo() {
    try {
        const resp = await fetch(`${API_BASE}/me`);
        if (resp.ok) {
            const user = await resp.json();
            document.getElementById("user-info").textContent = user.email;
        } else {
            document.getElementById("user-info").textContent = "Not logged in";
        }
    } catch (err) {
        document.getElementById("user-info").textContent = "Error loading user";
    }
}


        // Simple sanitizer for HTML email content
        function sanitizeHtml(html) {
            if (!html) return "(No content)";
            const temp = document.createElement("div");
            temp.innerHTML = html;

            const allowedTags = ['div','span','p','br','b','i','u','strong','em','a','img',
                                 'table','tr','td','th','tbody','thead','ul','ol','li',
                                 'h1','h2','h3','h4','h5','h6','blockquote','pre','code','hr'];
            const allowedAttrs = ['href','src','alt','title','style','width','height','border','cellpadding','cellspacing'];

            const walk = (node) => {
                for (let i = node.children.length - 1; i >= 0; i--) {
                    const child = node.children[i];

                    if (child.tagName === 'SCRIPT' || child.tagName === 'STYLE') {
                        child.remove();
                        continue;
                    }

                    if (!allowedTags.includes(child.tagName.toLowerCase())) {
                        child.replaceWith(document.createTextNode(child.textContent + ' '));
                        continue;
                    }

                    for (let j = child.attributes.length - 1; j >= 0; j--) {
                        const attr = child.attributes[j];
                        if (!allowedAttrs.includes(attr.name.toLowerCase())) {
                            child.removeAttribute(attr.name);
                        }
                    }

                    walk(child);
                }
            };

            walk(temp);
            return temp.innerHTML;
        }

       // Initial load
loadUserInfo();
loadInbox();
    </script>
</body>
</html>
